    <table border="1" cellpadding="10">

        <tr>

            <td>Nombre</td>

            <td>

                <input 
                    type="text" 
                    class="Caja_de_Texto"

                    placeholder="Ingrese su nombre"

                    onkeypress="return soloLetras(event)"
                >

            </td>

        </tr>

        <tr>

            <td>Edad</td>

            <td>

                <input 
                    type="text" 
                    class="Caja_de_Texto"

                    id="edad"

                    maxlength="3"

                    placeholder="Solo números"

                    oninput="validarEdad()"
                >

                <br>

                <span id="errorEdad" style="color:red; font-size:12px;"></span>

            </td>

        </tr>

        <tr>

            <td>Correo</td>

            <td>

                <input 
                    type="email" 
                    class="Caja_de_Texto"

                    placeholder="Ingrese su correo"
                >

            </td>

        </tr>

        <tr>

            <td>
                <button id="boton_enviar">Enviar</button>
            </td>

            <td>
                <button id="boton_borrar">Borrar</button>
            </td>

        </tr>

    </table>

    <br><br>

    <div id="footer">
        Nombre © <br>
        Curso 5A <br>
        UTLVTE 2026
    </div>

    <script>

        function validarEdad() {

            let edad = document.getElementById("edad").value;

            let error = document.getElementById("errorEdad");

            if (isNaN(edad)) {

                error.innerHTML = "Solo números";

                document.getElementById("edad").value = "";

            }

            else if (edad > 150) {

                error.innerHTML = "Máximo 150 años";

                document.getElementById("edad").value = "";

            }

            else {

                error.innerHTML = "";

            }

        }

        function soloLetras(e) {

            let tecla = e.key;

            let letras = /^[A-Za-zÁÉÍÓÚáéíóúñÑ ]+$/;

            if (!letras.test(tecla)) {

                return false;

            }

        }

    </script>
